<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Preview README</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown.min.css">
    <style>
        body { box-sizing: border-box; min-width: 200px; max-width: 980px; margin: 0 auto; padding: 45px; }
        .error-msg { background: #ffebee; color: #c62828; padding: 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ef9a9a; }
    </style>
</head>
<body class="markdown-body">
    <div class="error-msg">
        <strong>Nota:</strong> Si la animación de la serpiente (Snake) no carga, es porque la rama <code>output</code> aún no existe en tu repositorio de GitHub. 
        <br>Debes hacer <code>git push</code> y ejecutar la Action en GitHub.
    </div>
    <div id="content">Cargando...</div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        fetch('README.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            });
    </script>
</body>
</html>
