name: Daily Bible Verse

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-verse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch verse of the day
        id: verse
        run: |
          # Lista de versos para rotar por día del año
          DAY=$(date +%j | sed 's/^0*//')
          VERSES=(
            "john/3:16" "psalms/23:1" "philippians/4:13" "jeremiah/29:11"
            "romans/8:28" "proverbs/3:5-6" "isaiah/40:31" "matthew/6:33"
            "psalms/46:1" "romans/8:38-39" "joshua/1:9" "2timothy/1:7"
            "psalms/121:1-2" "john/14:6" "galatians/5:22-23" "ephesians/2:8-9"
            "matthew/5:16" "john/15:13" "romans/12:2" "proverbs/22:6"
            "isaiah/41:10" "psalms/37:4" "hebrews/11:1" "john/16:33"
            "romans/15:13" "colossians/3:23" "1corinthians/13:4-7" "psalms/119:105"
            "matthew/11:28" "revelation/21:4" "1john/4:19" "proverbs/18:24"
            "psalms/27:1" "james/1:2-3" "2chronicles/7:14" "luke/6:31"
          )
          INDEX=$(( (DAY - 1) % ${#VERSES[@]} ))
          VERSE_REF="${VERSES[$INDEX]}"
          echo "ref=$VERSE_REF" >> $GITHUB_OUTPUT

          RESPONSE=$(curl -s "https://bible-api.com/$VERSE_REF?translation=rvr1960")
          TEXT=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['text'].strip().replace('\n',' '))")
          REF=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['reference'])")

          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "reference=$REF" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          TEXT="${{ steps.verse.outputs.text }}"
          REF="${{ steps.verse.outputs.reference }}"
          BADGE_TEXT=$(echo "$REF" | sed 's/ /%20/g; s/:/:%20/g')
          NEW_BLOCK="<!-- BIBLE-VERSE:START -->\n> *\"$TEXT\"*\n>\n> — **$REF**\n<!-- BIBLE-VERSE:END -->"
          perl -i -0pe "s|<!-- BIBLE-VERSE:START -->.*?<!-- BIBLE-VERSE:END -->|$NEW_BLOCK|s" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update daily bible verse"
          git push
